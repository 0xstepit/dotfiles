format = """
$username\
$hostname\
$localip\
$directory\
$python\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$line_break\
$container\
$nix_shell\
$shell\
"""

palette = 'new'

command_timeout = 5000 # milliseconds (default is 500ms)

[line_break]
disabled = true

[palettes.new]
purple = '#a670db'

[username]
style_user = "blue"
style_root = "red"
format = "[$user]($style) in "
disabled = true
show_always = true

[directory]
truncate_to_repo = true
style = "purple"

[git_branch]
symbol = " "
style = "cyan"

[git_status]
stashed = "s"
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
style = "red"
format = '([$all_status$ahead_behind]($style) )'

[nix_shell]
disabled = false
symbol = "NIX "
style = "yellow"
impure_msg = '[impure shell](bold red)'
pure_msg = '[pure shell](bold green)'
unknown_msg = '[unknown shell](bold yellow)'
format = 'via [☃️ $state( \($name\))](bold blue) '

[python]
format = 'with [(${version}) (\($virtualenv\) )]($style)'
style = "blue bold"
